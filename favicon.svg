<svg viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg" shape-rendering="geometricPrecision">
  <!-- Outer Frame -->
  <rect x="2" y="2" width="28" height="28" rx="3" stroke="#0A0E14" stroke-width="2" fill="#FFFFFF"/>
  
  <!-- Pin/Window Markers -->
  <!-- Top -->
  <rect x="10.25" y="0.5" width="1.5" height="1" fill="#0A0E14"/>
  <rect x="20.25" y="0.5" width="1.5" height="1" fill="#0A0E14"/>
  <!-- Bottom -->
  <rect x="10.25" y="30.5" width="1.5" height="1" fill="#0A0E14"/>
  <rect x="20.25" y="30.5" width="1.5" height="1" fill="#0A0E14"/>
  <!-- Left -->
  <rect x="0.5" y="10.25" width="1" height="1.5" fill="#0A0E14"/>
  <rect x="0.5" y="20.25" width="1" height="1.5" fill="#0A0E14"/>
  <!-- Right -->
  <rect x="30.5" y="10.25" width="1" height="1.5" fill="#0A0E14"/>
  <rect x="30.5" y="20.25" width="1" height="1.5" fill="#0A0E14"/>

  <!-- Internal Blocks -->
  <!-- Block A (Active Core) -->
  <rect x="6" y="6" width="9" height="9" fill="#0A0E14"/>
  <!-- Block B -->
  <rect x="17" y="6" width="9" height="9" stroke="#0A0E14" stroke-width="1" fill="#FFFFFF"/>
  <!-- Block C -->
  <rect x="6" y="17" width="9" height="9" stroke="#0A0E14" stroke-width="1" fill="#FFFFFF"/>
  <!-- Block D -->
  <rect x="17" y="17" width="9" height="9" stroke="#0A0E14" stroke-width="1" fill="#FFFFFF"/>

  <!-- Cross Trace -->
  <line x1="15" y1="16" x2="17" y2="16" stroke="#0A0E14" stroke-width="1"/>
  <line x1="16" y1="15" x2="16" y2="17" stroke="#0A0E14" stroke-width="1"/>
</svg>
